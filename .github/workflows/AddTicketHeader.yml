name: Prepend Ticket Header to PR

on:
  pull_request:
    types: [opened, edited]

jobs:
  add-ticket-header:
    runs-on: ubuntu-latest
    steps:
      - name: Replace PR ticket header
        uses: actions/github-script@v6
        with:
          script: |
            const prTitle = context.payload.pull_request.title;
            const prNumber = context.payload.pull_request.number;
            const prBody = context.payload.pull_request.body || "";

            // Match ticket ID in PR title (APP-XXX)
            const ticketMatch = prTitle.match(/APP-\d+/);
            if (ticketMatch) {
              const ticketId = ticketMatch[0];

              // Replace existing [APP-XXX] or ## APP-XXX: in PR body
              const updatedBody = prBody.replace(/\[APP-XXX\]|##\s?APP-\d+:?/, `## ${ticketId}:`);

              // Append accessibility checklist
              const accessibilityChecklist = "\n- Automated accessibility tests pass\n- VoiceOver verified on critical flows\n- Tap targets and labels verified\n";

              const newBody = `${updatedBody}${accessibilityChecklist}`;

              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                body: newBody
              });

              console.log(`Replaced PR header with ${ticketId} and added accessibility checklist`);
            } else {
              console.log("No ticket ID found in PR title");
            }
