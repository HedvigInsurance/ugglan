name: Run Tests (arm64)

# Evaluation workflow: runs the SAME unit + snapshot test scheme that Xcode Cloud
# runs ("Ugglan-Workspace" against Ugglan.xcworkspace), but on an Apple Silicon
# (arm64) GitHub-hosted runner instead of Xcode Cloud's Intel hosts.

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: run-tests-arm64-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit + snapshot tests on arm64 simulator
    # macos-15 is Apple Silicon (arm64)
    runs-on: macos-15
    timeout-minutes: 90
    permissions:
      contents: read

    env:
      # Pin a fixed snapshot-failure output dir so we can collect it on failure.
      # The Tuist test action defaults SNAPSHOT_ARTIFACTS to a random /tmp/<uuid>
      # path; we override it for the whole xcodebuild invocation below.
      SNAPSHOT_ARTIFACTS: ${{ github.workspace }}/__SnapshotFailures__

    steps:
      - name: Checkout ugglan
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install mise + Tuist
        run: |
          chmod +x scripts/install-tuist.sh
          scripts/install-tuist.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Small generic cache for the downloaded SwiftGen binary (a tool, not a
      # build product) so we don't re-download it every run.
      - name: Cache SwiftGen binary
        uses: actions/cache@v4
        with:
          path: build/swiftgen-6.6.3
          key: ${{ runner.os }}-swiftgen-${{ hashFiles('scripts/swiftgen.sh') }}
          restore-keys: |
            ${{ runner.os }}-swiftgen-

      # iOS-specialised cache: persists Xcode DerivedData + the resolved SwiftPM
      # packages AND restores file modification times. The mtime restore is the
      # reason to use this over a plain actions/cache on DerivedData — Xcode keys
      # incremental-build freshness on mtimes, which `git checkout` resets, so a
      # naive cache yields no compile reuse. Keyed on Package.resolved so it
      # invalidates only when SPM dependencies actually change.
      - name: Xcode cache (DerivedData + SwiftPM)
        uses: irgaly/xcode-cache@v1
        with:
          key: xcode-cache-deriveddata-${{ github.workflow }}-${{ github.sha }}
          restore-keys: xcode-cache-deriveddata-${{ github.workflow }}-
          swiftpm-package-resolved-file: Ugglan.xcworkspace/xcshareddata/swiftpm/Package.resolved

      - name: Post-checkout prep (swiftgen, codegen, tuist generate)
        run: |
          chmod +x scripts/post-checkout.sh
          scripts/post-checkout.sh

      # Same scheme + workspace as the Xcode Cloud "Tests" action. iPhone 16 is an
      # arm64 simulator on the arm64 runner, CODE_SIGNING_ALLOWED=NO mirrors the
      # other CI build workflows.
      - name: Run tests
        run: |
          mkdir -p "$SNAPSHOT_ARTIFACTS"
          xcodebuild test \
            -workspace Ugglan.xcworkspace \
            -scheme Ugglan-Workspace \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -resultBundlePath "${{ github.workspace }}/TestResults.xcresult" \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO \
            SNAPSHOT_ARTIFACTS="$SNAPSHOT_ARTIFACTS"

      - uses: kishikawakatsumi/xcresulttool@v1
        if: always()
        with:
          path: ${{ github.workspace }}/TestResults.xcresult
          show-passed-tests: false

      # Mirrors what ci_scripts/ci_post_xcodebuild.sh-adjacent tooling collects:
      # the snapshot diff/failure images written to SNAPSHOT_ARTIFACTS, plus the
      # full result bundle for triage.
      - name: Upload snapshot failures
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-failures
          path: ${{ env.SNAPSHOT_ARTIFACTS }}
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload test result bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ${{ github.workspace }}/TestResults.xcresult
          if-no-files-found: ignore
          retention-days: 14
