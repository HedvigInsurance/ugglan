fragment AgreementFragment on Agreement {
	id
    activeFrom
    activeTo
    certificateUrl
    creationCause
	basePremium {
		...MoneyFragment
	}
    productVariant {
        ...ProductVariantFragment
    }
    addons {
        addonVariant {
            ...AddonVariantFragment
        }
    }
}

fragment ContractFragment on Contract {
      currentAgreement {
        ...AgreementFragment
      }
      coInsured {
        ...CoInsuredFragment
        }
      coOwners {
        ...CoOwnerFragment
        }
      exposureDisplayName
      exposureDisplayNameShort
      id
      masterInceptionDate
      supportsMoving
      supportsCoInsured
      supportsCoOwners
      supportsTravelCertificate
      supportsChangeTier
      terminationDate
      upcomingChangedAgreement {
         ...AgreementFragment
      }
      isMissingPetId
}

fragment CoInsuredFragment on ContractCoInsured {
    id
    birthdate
    firstName
    lastName
    hasMissingInfo
    ssn
    activatesOn
    terminatesOn
}

fragment CoOwnerFragment on ContractCoOwner {
    id
    birthdate
    firstName
    lastName
    hasMissingInfo
    ssn
    activatesOn
    terminatesOn
}
