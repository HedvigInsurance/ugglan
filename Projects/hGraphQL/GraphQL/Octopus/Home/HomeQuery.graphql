query Home($includeManualCharge: Boolean!) {
  currentMember {
    id
    activeContracts {
        ...ContractFragment
    }
    pendingContracts {
      externalInsuranceCancellationHandledByHedvig
      exposureDisplayName
      id
    }
    memberActions {
        isContactInfoUpdateNeeded
    }
    missedChargeIdToChargeManually @include(if: $includeManualCharge)
  }
}
