query PaymentMethods {
    currentMember {
        paymentMethods {
            payinMethods {
                ...MemberPaymentMethodFragment
            }
            payoutMethods {
                ...MemberPaymentMethodFragment
            }
            defaultPayinMethod {
                ...MemberPaymentMethodFragment
            }
            defaultPayoutMethod {
                ...MemberPaymentMethodFragment
            }
            availableMethods {
                provider
                supportsPayin
                supportsPayout
            }
            chargingDay
            missingConnection
        }
		activeContracts {
			terminationDueToMissedPayments
			terminationDate
            currentAgreement {
                productVariant {
                    typeOfContract
                }
            }
		}
        terminatedContracts {
            currentAgreement {
                productVariant {
                    typeOfContract
                }
            }
        }
		pendingContracts {
			id
            productVariant {
                typeOfContract
            }
		}
    }
}

fragment MemberPaymentMethodFragment on MemberPaymentMethod {
    provider
    status
    isDefault
    details {
        ... on PaymentMethodInvoiceDetails {
            delivery
            email
        }
        ... on PaymentMethodSwishDetails {
            phoneNumber
        }
        ... on PaymentMethodBankAccountDetails {
            account
            bank
        }
    }
}
